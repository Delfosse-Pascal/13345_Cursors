  <!-- ============= Script du lecteur audio persistant (Web Audio API) ============= -->
  <script>
  /*
   * Musique d'ambiance générée par Web Audio API.
   * Avantages : aucun fichier requis, fonctionne 100 % hors-ligne, autorisée
   * par les navigateurs après un clic utilisateur (politique d'autoplay).
   * Esthétique : drone grave kaki / brun, filtré, légèrement modulé.
   */
  (function () {
    'use strict';
    let ctx = null;
    let nodes = null;
    let playing = false;
    const btn = document.getElementById('btn-music');

    function buildDrone() {
      ctx = new (window.AudioContext || window.webkitAudioContext)();

      // Oscillateurs : deux notes graves accordées en quinte (la1 + mi2)
      const osc1 = ctx.createOscillator();
      osc1.type = 'sawtooth';
      osc1.frequency.value = 55;        // la1
      const osc2 = ctx.createOscillator();
      osc2.type = 'sawtooth';
      osc2.frequency.value = 82.4;      // mi2
      const osc3 = ctx.createOscillator();
      osc3.type = 'triangle';
      osc3.frequency.value = 110;       // la2

      // LFO pour faire respirer le filtre
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 0.08;       // ~12 s par cycle
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 200;

      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 320;
      filter.Q.value = 6;

      lfo.connect(lfoGain).connect(filter.frequency);

      const master = ctx.createGain();
      master.gain.value = 0.0;          // démarre à 0, fade-in

      osc1.connect(filter);
      osc2.connect(filter);
      osc3.connect(filter);
      filter.connect(master).connect(ctx.destination);

      [osc1, osc2, osc3, lfo].forEach(o => o.start());

      // Fade-in doux
      master.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 2);

      nodes = { osc1, osc2, osc3, lfo, filter, master };
    }

    function start() {
      if (!ctx) buildDrone();
      else if (ctx.state === 'suspended') ctx.resume();
      playing = true;
      btn.classList.add('playing');
      btn.setAttribute('aria-pressed', 'true');
      btn.textContent = '■ Stop';
    }
    function stop() {
      if (!ctx) return;
      // Fade-out puis suspension
      nodes.master.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
      setTimeout(() => { if (ctx) ctx.suspend(); }, 1100);
      playing = false;
      btn.classList.remove('playing');
      btn.setAttribute('aria-pressed', 'false');
      btn.textContent = '♪ Musique';
    }

    if (btn) {
      btn.addEventListener('click', () => {
        if (playing) {
          stop();
        } else {
          // Re-monter le gain à chaque relance
          if (ctx && nodes) {
            nodes.master.gain.cancelScheduledValues(ctx.currentTime);
            nodes.master.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 2);
          }
          start();
        }
      });
    }
  })();
  </script>

</body>
